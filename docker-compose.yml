services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - MONGODB_URI=mongodb://mongo:27017/fitmeal
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
